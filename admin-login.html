<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo - NeuroWine 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=8.2">
    <style>
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 100px);
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .login-card {
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid var(--color-gold);
            border-radius: 12px;
            padding: 3rem 2rem;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .login-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .login-title {
            color: var(--color-gold);
            font-family: var(--font-heading);
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--color-text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        
        .error-message {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            padding: 0.8rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>

<body class="dark-theme" style="background-image: url('Fotos do evento 2023/Randomico 1/150_Evento-1o-NeuroWine-Day-3-151-scaled.jpg'); background-size: cover; background-position: center; background-attachment: fixed;">

    <div class="hero-overlay" style="position: fixed;"></div>

    <nav class="navbar" id="navbar" style="background: rgba(5, 5, 8, 0.9);">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="Logo_NeuroWine.jpg" alt="NeuroWine Logo" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Página Inicial</a></li>
            </ul>
        </div>
    </nav>

    <div class="login-container fade-in-up">
        <div class="login-card">
            <span class="login-icon">🍇</span>
            <h1 class="login-title">Área Restrita</h1>
            <p class="login-subtitle">Acesso exclusivo para os organizadores do evento.</p>

            <div id="loginError" class="error-message">Usuário ou senha inválidos.</div>

            <form id="adminLoginForm" class="registration-form" style="text-align: left;">
                <div class="form-group full-width" style="margin-bottom: 1.5rem;">
                    <label for="username">Usuário (nome.sobrenome)</label>
                    <input type="text" id="username" name="username" placeholder="ex: wuilker.campos" required autocomplete="username">
                </div>

                <div class="form-group full-width" style="margin-bottom: 2rem;">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Digite a senha" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">Acessar Dashboard</button>
            </form>
        </div>
    </div>

    <script src="admin-auth.js"></script>
</body>

</html>
